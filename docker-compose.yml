services:
  postgres: 
    image: postgres:17 
    container_name: ecom-postgres
    environment:
      POSTGRES_DB: ecommerce 
      POSTGRES_USER: cinammon  
      POSTGRES_PASSWORD: cinammonpass 
      TZ: Asia/Saigon
    
    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data 

  
  minio: 
    image: minio/minio:latest 
    container_name: ecom-minio 
    ports:
      - "9000:9000" # S3 API 
      - "9001:9001" # Web Console 
    environment:
      MINIO_ROOT_USER: cinammon  
      MINIO_ROOT_PASSWORD: cinammonpass 

    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data 

volumes:
  postgres_data: 
  minio_data: 
